front:
  text: 三極至命筌蹄芥五
  hash: sha256:249c9e15c996ef989dfb90b4e0570a552e443c6883ce7e99f1b2e27655ef1d22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0287_HFL_000-001a, image: hfl/0133/0133-120.png}
body:
  text: 果齋王慶升述孰者為陽孰者陰一奇渾未有身心天之所命為真性二偶萌生始古今一奇二偶成三畫上天下地人中宅得其粹者産聖賢草木昆蟲一管魄純善純陽體至剛是名元始法中王斯為天一清無濁太極才生作火鄉無極止一性有五大道混融合文武能持十戒返其初寂寂能為萬物主子半陽生午半陰從兹寒暑互相侵半斤八兩相清濁中有虛皇是汝心真形赤子虛皇老青中赤外顏色好意土歸迎金水鄉無星間隔何煩惱卯酉剛成半酉柔晝更夜代不停留尊卑貴賤分輕重陰降陽升氣已稠清而輕者為剛健重而濁者為柔順此儀乃是太極形陰左退子陽右進從微至著質方成四象初爻曰太清天地雌雄猶混沌依然只是火之名此雖有質亦但氣往返二便並口鼻抽添煅煉一二年九載功成能自俾陰陽剛柔再降升交錯始立八卦名十五為少十六中二十以上皆長成男三十一女二二向去皆居父母位若解參同道德機九旬一年身有翅四象之前太極專八卦而上皇極權到此皇極以無極最先老子得其全老子即是太清帝出在世間不知世分形散影身外身尊上道之必康濟不曾修聖便修真徒煮空鐺浪苦辛真聖既修無外藥豈能變化妙形神內藥修真惟九戰仙術年年無注礙須知罔念即為狂聖道千生不可發八卦中黃虛此心窮年陶鍊是孤陰九宫如得用中理骨换玉兮筋變金此九元非一箇九九箇九宫九處走道德經中事已全參同契裏添虛守用得其中已九和剝山石果未離柯得將十合待純熟不可烹煎瓶裏鵝十月霜飛丹始熟齋心潔己方堪服手把天瓢盡意天但覺神歡陰鬼哭天之三徒日月星三光不死為三靈地之徒子食産貨終成泯沒無留形人徒精氣神三藥得法烹煉死方却天官巳上得更生合甲配離超死厄天關細細籥靈風地軸時時橐火紅風降火升成鼎象心藏密户水金宫此是先天無極道混元設教為天寶不拘子午擇陰陽性復情還人不老手為人間把盛衰閉口牢牢提兌姬周易下經無義易行之道妙獨難知此箇天關從古祕都緣此道忒容易若能轉此生殺機山澤何愁不通氣震稱男足動成非女殳牽情巽莫隨會得箇中恆益理雷風相搏是天機足字從口又從止口訓防間止訓止若非止止密防間無上神仙只在此耳目之官不解思尋聲逐色死為期耳收聽返能相射水火潛交也太奇俱知耳目坎離户水火飛騰盡由汝含光凝韻兩平時魄聖魂昌易寒暑知盧守靜總云知復命歸根會者稀精氣通天恆重厚玄關一竅是天機玄關一竅通水府心號離宫身牝户此皆內象玄牝門左右間言君勿取玄牝之門識者稀多將口鼻強呼之心腎兩邊分左右俱非天地坎和離迷者不識真金木肝膽肺腸稱九曲砂汞鉛銀若箇知天地神仙為眷屬五車三乘羊車小乘羊車小乘者橐籥起火之術也其法抽縮外腎使膀胱下昧民火下合外腎左文右武之地火從下上達直透三關行之七七日內自有甘露降于玉池甘露一名黃中酒又名曰石源又名醍醐常能行而不弛可以返老還童漸入聖道矣鹿車中乘鹿車中乘者守中之法也其法降心中上昧君火入于兩腎之間與中昧臣火相配化為芙蓉出於泓水之中存其真人坐于花上綿綿不絶如此二十日通前羊車小乘之術共計六十九日則泥丸天谷靈藥自生靈藥一名黑汞水銀一名水中金即元精也此乃補腦還精之法人能常念之則優入聖域矣或以轆轤為鹿車者乃循真之事也每日寅艮二時端坐存念鹿車之道毋令間斷亦以四十九日為限須是先行羊車次行鹿車既行鹿車乃行牛車三車並行斯名大乘也老子之治大國若烹小鮮包犧之法離為網罟以畋以漁堯舜則允執厥中文王之艮其背周公之艮限薰心孔子之退藏於密者皆守中之旨也曰産藥曰鍊鉛實腹鉛乃黑鉛即黑汞也亦名黑龜精又名黑龜肝降于天谷謂之白龍肝也此守中於始之名也曰溫養曰神土坎火此守中於中之名也曰守城曰野戰曰封閉關鎖此守中於終之名也曰沐浴曰真氣熏蒸此守中於刑德之名也有曰守一者以左腎之神為太一右腎之神為玄一兩腎混合之神為太一也有曰守真者以二之則偽一之則真也有曰守黑者以顯之則白隱之則黑也有曰守雌者以奮飛為雄隱伏為雌也又守有黃房者以密户居正方前直臍中也黃房者亦名黃庭又曰丹田説不多同有指泥壇為之者泥壇泥丸亦名天谷亦名天有指絳宫為之者絳宫上命門也又名節榮亦名應谷又有指心腎脾膽為之者是皆思一部之法耳苟欲主陽消陰俾水中金火中木二者內無間隔非守中不能也然此守中之法乃纍聖相傳之密旨實作聖工夫也誠能允而執之則必世世羲陶人人虞舜矣陟容廣而遊太清金梯玉階此焉基之牛車大乘牛車大乘者屏氣回風之道也屏氣者閉鼻息而不呼也出氣曰呼入氣曰吸回風者回天風以合神靈也神靈心神曰元君字守靈凡行此道者須先行羊車四十九日鹿車二十日共六十九日了却行此道一十二日三車通計八十一日自然天谷靈藥繁生可以修真矣若上機大智之士一聞千悟者三車並行只一十日靈藥便生不須八十一日也若作聖做工夫却當次第行之不可驟也且先不拘時候行羊車四十九日了次每日寅艮二時行鹿車四十九日然後每日子午艮寅三時行牛車四十九日一百四十七日足依然不拘時候行之實使綿綿不絶可也所謂君子自強不息者盡行此道欲不倦也綿綿不絶惟狂克念作聖矣行之苟倦惟聖罔念作狂矣克念作聖則道心著而人心安罔念作狂則人心危而道心微矣羊鹿牛三車其實一大乘也但人有利鈍而性有巧拙故先聖立教有漸頓之殊況且世人不務勤師唯尚摽掠見丹經有閉尾閭之説便以羊車為閉尾閭而廢之見丹經有吹噓之説便以牛車為吹噓而廢之見丹經有存息之説便以鹿車為存息而廢之殊不思不行羊車則地火不起人心危而不安矣不行牛車則天風不回道心微而不著矣不行鹿車則百神不混合人心自人心道心自道心而不精一矣老子之橐簫守中玉皇之回風混合大舜則精一厥中亦大乘而已非二道也右先聖之誚閉尾閭者指採陰者耳以採陰為殺人之道也誚吹噓者指行六字氣者耳以六字為瀉三焦五藏之道也誚存息者指注想臍下者耳以臍為糟粕溝瀆之場止可灼艾攻病非栖心退藏之所也癡人面上不得説夢將以救人反以悟人豈聖師之心哉遂明述大乘之道以祛天下之惑學道者苟留神焉聖域可優入矣皇極之人會歸中庸之率性三易之中爻皆畢於此矣勉旃古訣云人心惟危腎邪人心從之則危道心惟微心正道心放之則微惟精惟一精強不敗一終不離允執厥中信天順守作聖之域大牛車上乘大牛車上乘者修真內鍊之法也其法以元精黑汞為藥元氣紅鉛為火子陽午陰抽添斤兩口口相傳不記文字三年功成九載圓就化精成氣氣變成神千日默朝一紀升天即修內丹可以長生不死可以坐脫立亡已證真空邁躋妙有矣大白牛車無上乘大白牛車無上乘者用雪山白牛外丹修仙之術也所謂乾坤為鼎器乾為馬其道成男曰大國大象者皆乾道也坤為牛其道成女為波斯伽曰小國小象者皆坤道也少為波斯伽屬兌卦兌屬金而金色白故曰白牛乾變坤卦主立冬小雪二氣占先天艮山之位故曰雪山白牛也坎離為藥物坎為中男坤得乾之中氣而成也坎屬水而配鉛水中有金鉛中有銀名曰黑汞又名水銀此坎之藥物也離為中女為波斯伽乾得坤之中氣而成也離屬火而配砂火中有木沙中有汞名曰紅鉛又名朱汞亦名水銀此離之藥物也五千文謂之玄牝者乾坤也營魄者離坎也七返九還金液煉形者是也一時姤精一日結胎十月脫胎三年無陰是謂純陽之仙六年絶粒鼻無喘息名曰至真白玉其骨黃金其筋履蹈虛空洞貫金石此修仙之極致也自老子黃帝而下凡飛騰變化之儔皆修此耳故老子作道德經以詔後世黃帝著陰符經以彰厥旨其文三章皆纍聖口口相傳無有文字後世傳之者率多乖舛黃帝得之於石室字皆一丈又云驪山老母曾注其文是好事者托言之耳學者當具真眼目真人魏伯陽因之作周易參同契以極其底藴正陽鍾離權由之作雲房三十九章以祛似是之惑純陽吕嵓緣之作沁園春霜天曉角及窑頭脫空等歌以廣其意華陽施肩吾修之作會真記以誘進學之士雖皆發明道要顯示機緘然而火候法度溫養指歸並不曾説破天台怡真先生謫自紫陽真人宿德不渝感西華夫人發樞紐而授之以口訣道成授杏林石泰以悟真篇杏林道成授紫賢薛道光以還元篇紫賢道成授泥丸真人以復命篇泥丸道成授紫清真人白玉蟾以翠虛篇厥後之聞道者紫清之徒也愚宿性慕道獲遇紫清先生弟子桃源子姚師果見其龜形象武意其異人執弟子之禮者幾一紀纍以鉛汞之道叩之每辱引辭峻拒嘉熙己亥從道御前佑聖觀守缺暫歸次年庚子慨蒙奏聞道祖傳受內丹之訣如教行之果有靈驗尋為事奪兩致中輟續觀悟真篇云若云九載三年者總是推延款日程又云十月霜飛丹始熟恁時神鬼也須驚乃知內丹九年成功外丹十月脫胎由是蓬頭草足浪走台溫有菜隱先生楊師古邂逅永嘉廛隱一見傾心授以藥物鼎器之旨時淳祐癸卯十一月也甲辰三月三日復授以火候回視丹經果合符節元來此道乃是長生不死變化飛騰之道今人往往只説速死之法否則守尸而已愚患後人之篤好者或有所聞剛為此輩所惑共墮迷津實可哀痛姑略具其梗槩云注紫清白真人金液大還外丹訣要做神仙天寶修聖謂之煉聖之道藥物無斤兩火候無時日一日十二時時時不絶一年十二月月月長存百日成功一年圓就養成聖胎名金液大遺神丹是為三車大乘之道也乃千經之髓萬法之基也靈寶修真謂之煉氣之法藥物有斤兩火候有時日一日十二時只用二時一年十二月只用十月三年成功九載圓就養成真胎名曰金液大遺內丹是謂大牛車上乘之法也九載數足凝神天谷日行默朝上帝之訣精勤千日通前一紀脫殼飛神不生不滅矣神寶修仙謂之煉形之術藥物雖無斤兩火候却有時日一日十二時只用一時一年十二月只用九月九十日成功三百日圓就始出仙胎點化凡質不但却死且得更生服之三年體變純陽不愁寒暑養之六載鼻無喘息不患飢虛三千日足變化飛騰矣名曰金液大遺外丹是為大白牛車無上乘之術也鍊丹工夫鍊丹有三種一者神丹以存養而成謂之打坐二者真丹以作用而成謂之行功三者仙丹理貫三才藥需二物謂之工夫亦有何難神丹三萬六千刻刻刻行火一刻不行便成間斷也內丹七百二十以上時時時行火一時不行亦成間斷也外丹只八十一時行火而已豈不易乎向雷聲震處謂地雷復卦之月也一陽來復謂七日來復之日也玉罏火熾玉罏偃月罏也火者天然真火也得金鼎太素寒煙感之則火熾矣金鼎煙寒金鼎朱砂鼎也煙者太素煙也得玉罏天然之火則煙不寒矣姹女乘龍姹女震中陰爻也乘者載也龍者赤龍與青龍也金公跨虎金公兌中陽爻也跨虎騎也虎者黑虎與白虎也片餉之間結大還片餉之間者一食飯頃也結者鉛凝汞結也大者至大無外也遺者遺源返本也此金液大遺外丹雖假外藥即非金銀草木滓質之物止是太極未判之前先天一氣耳既有兩儀四象八卦五行則先天一氣分列四出散於萬物之內矣今能以不採之採不取之取而取之使天之氣復合為一是故謂之遺也丹田裏丹田者黃房也密户也又名元田左有八卦蒼龍右有八威赤蛇中有金精猛獸三蟲內顧長生有路三蟲外趍神光漸去心神丹元君用離為網罟於此以畋以漁使三蟲不得奔逸以修深根固蒂長生久視之道田漁二字皆從田故曰丹田也或以臍下一寸五分氣海為丹田者或以二寸石門為丹田者或以三寸關元為丹田者此乃醫家行針灸之上下中三丹田之穴道也又以一寸三分為丹田者此是初機學道之士入門之丹田也又以心為丹田者此是襌門寂子明心見性之丹田者也又以胃左脾藏為丹田者此是叨餮之人行中黃健啖之丹田也又以脾右肝膽為丹田者此是俗師不遇真訣見雲房三十九章及破迷歌論等書攻擊捭闔混無定當只不曾説到膽上故執肝膽為丹田也又以眉心為丹田者此是入定出陰靈之丹田也以鼻端為丹田者此是襌流習定之丹田也以把花執菜握箑持瓢為丹田者此是開鋪席道人假物寄神之丹田也以嬰童兩目為丹田者此是學視日不瞬之丹田也以胞囊為丹田者此是閉尾閭之丹田也以玉莖為丹田者此是行金剛襌左道術者不漏法之丹田也以不念善不念惡謂之懸崖撒手為丹田者此是瞎眼襌和不明無念之旨者之丹田也以胃脘玉女為丹田者此是嗽咽津液之丹田也以臍心為丹田者此是旁門採陰者想心火之丹田也以兩目為丹田者此是存想左日右月之丹田也以大顴骨為丹田者此是存想九色圓象之丹田也又以面曰尺宅為丹田者此是修神庭之丹田也千蹊萬徑難以盡述要之皆非正丹田也正丹田者密户而已矣又以七竅中間為丹田者此是含眼光凝耳韻緘舌氣調鼻息和合四象之丹田也學道者之所共務不可廢也以泥壇為丹田者此是鍊內丹者一載之後移罏换鼎之丹田也初修真之士不當用之有白鴉一隻白鴉者元田白鴉也一名黑汞亦名白金即真汞也黑白相混故謂之白鴉隱而不可見則謂之水中金鉛中銀顯而不可用則謂之寒山白雪以其能走故謂之金精猛獸以其能飛故謂之白鴉一物而異名耳飛入泥丸飛入者用天寶鍊神混元入藥訣三車大乘之道二十日不間斷使元田真汞繁生所謂真種子者只此元田白鴉是也河車運入崑山河車者三河車也一者黃河車即雙關轆轤法耳所謂三返晝夜用師萬倍者也二者河車即橐籥起火術耳所謂河車不敢暫時停運入崑崙峰頂者三者紫河車即龍虎交姤訣耳桔槔説盡無生曲井底泥蛇舞柘枝者是也崑山崑崙峰即泥壇耳全不動纖毫過玉關謂元田白鴉不費纎毫動作自然透過玉關也玉關者戊己門也或毫略動便不成丹也把龜蛇烏兔把者將也龜蛇烏兔者水火日月也玄牝營魄也鉛砂汞銀也離中坎坎中離也名號多端其實只陰陽二字耳生擒活捉生擒活捉者蓋龜蛇烏兔非一性之物東西南北各列一方百姓日用常相間隔遺丹之法使無間隔之憂而有同宫之慶豈非生擒活捉哉古有王谷子不修陰陽之真理見易有乾道成男坤道成女及一陰一陽之謂道之語妄立三峰之術以女玄雍為上峰乳湩為中峰室童為下峰其徒助虐師意至於剖取心血竭吸陰精以為藥物冀成遺丹故雲房三十九章有悮殺之戒朋來之勸也霎時雲雨霎時者片餉也即感速之義也雲雨者雲雷屯及雷雨作解之義也夫雲之與雨皆坎水之氣耳而坎水遍於天地間感天氣則升而為雲感地氣則降而為雨雲雨之義即陰陽升降而成潤澤之義也一點成丹一點者赤水玄珠也大如黍米故曰一點也成丹者從微而著也白雪漫空黃芽滿院空别本作天院别本作地白雪者六虛白雪也空者六虛也黃芽者出土黃芽也院者六欲內院也六欲內院亦名黃宫以兩腎有六癸玉女專主作強其鋒甚鋭靈寶經謂斬馘六癸鋒者乃教人抑制六癸玉女作強之鋒庶幾黃芽滿而不溢也是以真人有莫教芽孽溢黃宫之戒黃芽白雪其名甚衆始也周流首腹四肢則為六虛白雪及其朝宗曲江之上則為太玄神水會歸桂海之中則為碧潭明月矣其潤德則為沆瀣甘露透入金鼎華池則為火汞流珠繁生黃宫真汞則為出黃芽名雖不同其實赤水玄珠耳諸家仙經所載名各不同雲房三十九章云真道不關書蓋務學不如務求師也服此刀圭永駐顏服此者靈烏望月而飲甘泉也刀者謂上士行之能裁成天地之道下士行之則殺身而後已圭者戊己二土也永駐顏者長生不老也打坐行功工夫各有一千二百門皆可以駐顏但不能長生不死耳惟是祖述老子伏羲文王周公孔子魏伯陽錘離吕嵓仙諸大聖人上焉黃帝下焉悟真一脈之道者斯能永駐顏也常溫養溫養節次有六一者入藥溫養煉內鉛為真種子時也二者野戰溫養進火時也三者守城溫養退火時也四者沐浴溫養火敗火死而熏蒸時也五者補寒溫養火絶而虛守時也六者移罏换鼎溫養脫胎入口之後時也其名雖六不過只用入藥一訣耳始一終五故曰常也使脫胎神化脫胎有三一者脫胎入口所謂強歷十月脫出其胎者也二者脫胎離殼所謂雞能抱卵心常聽蟬到成形殼自分也三者脫去凡胎所謂形神俱妙與道合真也神者不行而至不疾而速也化者真無貫金石妙有蹈虛空也身在雲端身有三一曰自有身所謂養就嬰兒我自做非是爺精娘血者也二者離合身謂坐在立亡身外有身者也三者妙無身所謂聚則成形散則成氣者既證自有之身是為地仙仙胎飛入泥丸泥丸為崑崙峰乃在自己雲端也次證離合之身是為神仙胎仙脫殼躡雲乃形雖處地而神在雲端也及證妙無之身是為天仙神超碧落形陟太虛乃形與神同在雲端也金液遺丹之妙至於身在云端其為不空之空矣述贊純陽真人霜天曉角乾坤未裂有物如何别性著才生氣陰陽尚混融鴻濛為太極體一抱雌雄解把鴻濛擘破龍漢延康劫鴻濛有女青女青從剖破兆出萬殊形説不知知不説闊論高談者無非衍舌端上仙修命術開口向人難妙訣真難徹妙道神仙訣宣傳自太清不逢師指點臆度枉傷情知音世所絶無數修仙子爭猜紙上文先師從説破瞶瞶反無聞要識陰陽顛倒乾坤蕩中氣離坎是全材識得先天象身朝萬化來月中日太陰元屬坎中有兔為陽房日雲中象營來變至剛日中月太陽離仲女中有桂林烏畢月恆山滿逢之魄自蘇天寶鍊神混元入藥妙訣一葉一枝花五內玲瓏玉雪身雖多關節解通神月明酒裏丹霞出不染汙泥不染塵陰坑是我家兩畔寒巖銷玉冰中間一派水澄清太陽影裏心花現便是芙蓉閬苑城硫黃見我死五神意馬是硫黃專駕心猿走八方妙香絶色濃薰染化作真人坐道場水銀結成砂黑汞紅鉛是水銀腎精心氣劈天真重新匹配歸無極漸證陰陽自有身鍊藥指真歌上品藥材何物是産在塵凡無遠邇強名玄牝汞和鉛精氣與神而已矣煉精者煉元精非淫姪所感之精男不淫女不姪匪學三峰黃谷術內裏明來會性情虛空無塵生妙質鍊氣者鍊元氣非口鼻呼吸之氣鼻不呼口不吸籥天橐地停徐息巽風離火鼎中烹直使身安命方立鍊神者鍊元神非心意念慮之神心不念意不慮念慮無非憂憶處忘憂絶憶靜存神精氣直騰天谷去精氣神藥最親以此修丹尚未真修丹只要乾坤髓乾坤髓即坎離仁坎離仁人不識萬論千書徒自覓天涯海角有仙師仙師混迹塵凡客塵凡客隱至人夏葛冬裘如古民榮辱窮通都不管冥冥懷抱藴精淳冥冥懷抱藴精淳妙道天機肯妄陳行滿三千功八百豈愁提耳不諄諄丹經舉要丹經最是易為先有畫無文幾萬年西伯授官紬藏史仲尼問禮斷韋編中宣道德皆微旨後露參同亦正傳平叔悟真猶顯道不離左右目之前三要總敘曰橐籥守中者老聃之三要也所謂綿綿若存者也曰闢户謂之乾闔户謂之坤聖人以此洗心退藏於密者孔子之三要也所謂往來不窮者也曰頂法暖法忍法釋氏之三要也所謂火宅三車者也諸家三要之説不同者以不得正傳也捨三聖師而宗曲學焉能出火宅而綿綿不窮乎三關總敘以精氣神為三關者內丹之三關也以形氣神為三關者外丹之三關也以鼻手足為三關者合內外之三關也九鼎總敘指心為九鼎者以心上通七竅下通二陰也所謂包含萬象體不罣一絲頭者也指絳宫為九鼎者以絳宫上通七節下通兩腎也所謂三彭走出含陰宅萬國來朝赤帝宫者也指密户為九鼎者以有三一六癸也指泥壇為九鼎者以有天靈九宫也二者所謂從此變為乾健體潛藏飛躍總由心者也指子時為九鼎者以甲己子午皆數九也所謂正一陽初動中宵漏永者也指一月為九鼎者以一月有九還也指一年為九鼎者以一年有九轉也所謂一月一還為一轉一年九轉九還同者也指三年為九鼎者以年成三姓三年成九姓也所謂三鉛只得一鉛就金果仙桃已露形者也指九載為九鼎者以一載煉一丹九載煉九丹也所謂一載生箇兒箇箇會騎鶴者也陰符破迷贊至樂性餘仁者無憂此性不欠智者常樂此性無餘既無樂也其樂自生極樂徇情性有餘矣至靜則廉靜者成仁動者由智苟動趍末性靜歸根篤靜不至乃生貪求絶利一源是為廉也陰符經注解頗多必皆託名聖賢取信愚俗但所見不同互有得失反誤學者故托迮而明者為二贊以曉方來觀者當必有默會者矣古仙真訣集句父子不堪傳天下神器箇箇惜金璧重寶不浪擲依然傳授與兒孫道不肯傳説不得工夫牛鬥危大道無為自古傳不云靜坐只安眠防虞慮險如牛鬥此語胡為不自然畫瓶裏面覓粉抹脂塗一畫瓶玉葫蘆樣果通靈水晶宫裏嫦娥翠一朵梅梨縞兔塋下士大笑之上士謙卑明造化一言便解真人話劣馬癡驢直痛鞭放下韁繩作笑鞄普角步教二切紫陽白真人嘗贈趙寺丞詩云汞鉛不在身中取龍虎當為意外求會得這些真造化何愁不曉鍊丹頭此語正與紫陽真人孤陰之説相契故併録于此也勸君不用斬三尸但絶貪嗔與姪癡六欲天中居內院精勤十月養嬰兒十月脫胎吞入口穿筋洞骨能飛走等間徑達元始天壽比天長同地久天長地久無盡時遷質移形人不知星辰隕伏龍蛇起一箇乾坤不動絲堪歎時人見大别清高盡向無邊説求生得死比比然倚草投胎稱寂滅此箇機關古聖傳仲尼三度絶韋編乾道坤道而已矣在於上下求之焉乾坤之道非他物只道杳冥並恍惚真精象物暗相逢結在黃宫成糊塗糊塗成形史伯華功勞全仗紫河車紫河車是何形色井底泥中一紫蛇修真六用曉夜半寒泉動地雷損奇益偶著靈胎一壼鳳髓朝朝飲海底紅蓮火底栽暮日中姤象振天風武減文加一餉工熟煮龜肝餐八兩山泉空泥暮為蒙行孤雲地暖間離岫野鶴天寬倦返巢直道往來無絆礙火城何必繫如匏住赫日騰空碾不停光芒馳散小於星育精金水丘寒地露沐千山草木青坐洗心藏密匪求安歸復工夫怕十寒水土既平神鼎立芙蓉地裏坐端端卧默默昏昏入鬼窠惺惺憭憭未圓陀西山日暝烏巢桂解鬼休兵馳睡魔五空頌頑空頑空枯坐斬生緣日事無縈夜不眠形木心灰成底事有聞行道却凝堅性空性空虛曠日清間動若浮雲靜似山懶打頑空無則法有聞行道必間關法空法空大抵似頑空有動依然在靜中按月按時行卦氣二千門路擬皆通不空不空空裏有工夫歸復元陽靜處符陽復陰消須淨盡惟餘黍米一明珠真空真空妙用妙難思倣佛還如歲運推夜代晝更寒暑序了無停迹孰為之修丹十戒一戒遏惡勿聽心田惡念生芟除淨盡自明平惡人惡事須還遠氣定神安骨自清二戒揚善孝友仁慈衆善芽更須執禮奬忠加救危扶困揚諸善長作尊賢樂道家三戒懲忿心火炎揚大察明怒將肝膽木來生苟非懲忿從天訓五賊張狂道海傾四戒窒欲主腎之宫號作強六鋒列女更殃𦍙地根不斬貪生樂欲海吹流入鬼鄉五戒禁酒點酒才經十二樓膽房心室起戈矛真陽泄向皮膚去髮減精凋去不休六戒絶荼草曰穿腸莫強吞只宜搜洗濁和昏如神不撓清明志身有甘香白石源七戒朝實朝食胡云校實些風寒暑濕怕衝邪功深已飽三田氣食味空多費齒牙八戒暮虛暮食常令腹帶虛六經調暢氣通疏多餐一口徒堙塞畎澮皆盈落尾閭九戒高牀坐卧牀宜三尺高更宜和軟足堅牢低時鬼氣侵人骨莞藁頻睎莫憚勞十戒低枕枕若高時最不宜慳慳三寸莫宜低真機妙旨無人會須遇仙師得耳提修仙善惡勸戒孝而不貪孝道無為百行先唐虞一脈此中傳苟貪利祿輕捐隕與道相違天與淵悌而不欲事兄從長孝能推悌道能為世表儀人欲一毫來間隔乖爭凌犯出肝脾恕而不嫉恕道元來甚易行但將心地放教平心平氣定無他事和氣春風日日生忠而不妬君師夫主事宜忠粒粟莖絲報始終知本知恩須合道妬才妬德反為凶神聖不嫉孝悌恕忠皆至德惟神與聖妙無極是為五大道之原拘忌之時行不得智而不淫智德元來先五德知道方為真知識一淪淫欲便昏迷所以申棖遭棄擲禮而不盜尊卑長幼俱有分貴賤賢愚不可紋常將恭敬守文禮躐等干名作盜論仁而不殺仁者誠為五德長善順慈和能育養曰悲曰覺曰陽剛悲戚剛頑殺之象義而不害五德權衡存於義事無不宜義乃利絲毫不利則害人君子謀為須擬議忠信不憎智禮仁義道之苗苟無忠信亦徒勞全此五常誠得本憎疑才動墮沉曹言無華綺人道貴華仙道實華綺之言不可出口甜舌滑能悅人只恐神仙道俱失口無惡聲此口誠為禍福關興戎出好片言間惡聲貴不形諸口天道從來亦好遺食無求飽飲食雖云能養氣養生過厚人不貴愚人飽味賢飽聞實腹有鉛宜著意居無求安居處求安最不宜不抽之緒密抽之守中橐籥綿綿用便是宣尼屏氣時對北勿唾學道須當惜氣精唾時精氣亦飄零北方天一五行始唾涕于兹隕百靈對北勿溺毋令尿露三光倚溺行屙大不祥對北二便尤不可都緣天一在其方勿妄殺龜龜配危星五行水應人左腎生根始無故殺之大不祥學道之人尤忌此勿妄打蛇蛇配虛星水中火應人右腎能關鎖無故打之大不祥學道之人尤忌可禁絶牛肉牛之為物詎難言簡籍敷陳歷歷然殺有嚴刑刊在律食多明報至於天福鎸首致神光熄禍及終貽鬼録編縱是陰功山嶽大削來磨去不饒賢天帝三霜一饗之凡庸烏可妄思為虧名失利皆由此惹疫遭官亦自兹好信因緣培福德毋耽口腹長愚癡飯蔬飲水猶堪樂何苦長年被舌欺三極至命筌蹄
