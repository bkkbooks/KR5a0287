body:
  text: 果齋王慶升述孰者爲陽孰者陰一奇渾未有身心天之所命爲眞性二偶萌生始古今一奇二偶成三畫上天下地人中宅得其粹者産聖賢草木昆蟲一管魄純善純陽體至剛是名元始法中王斯爲天一清無濁太極纔生作火鄉無極止一性有五大道混融合文武能持十戒返其初寂寂能爲萬物主子半陽生午半陰從兹寒暑互相侵半斤八兩相清濁中有虚皇是汝心眞形赤子虚皇老青中赤外顏色好意土歸迎金水鄉無星間隔何煩惱卯酉剛成半酉柔晝更夜代不停留尊卑貴賤分輕重陰降陽升炁已稠清而輕者爲剛健重而濁者爲柔順此儀乃是太極形陰左退子陽右進從微至著質方成四象初爻曰太清天地雌雄猶混沌依然只是火之名此雖有質亦但炁往返二便並口鼻抽添煅煉一二年九載功成能自俾陰陽剛柔再降升交錯始立八卦名十五爲少十六中二十以上皆長成男三十一女二二向去皆居父母位若解參同道德機九旬一年身有翅四象之前太極專八卦而上皇極權到此皇極以無極最先老子得其全老子即是太清帝出在世間不知世分形散影身外身尊上道之必康濟不曾修聖便修眞徒煮空鐺浪苦辛眞聖既脩無外藥豈能變化妙形神内藥修眞惟九戰仙術年年無注碍須知罔念即爲狂聖道千生不可發八卦中黄虚此心窮年陶鍊是孤陰九宫如得用中理骨换玉兮筋變金此九元非一箇九九箇九宫九處走道德經中事已全參同契裏添虚守用得其中已九和剥山石果未離柯得將十合待純熟不可烹煎瓶裏鵝十月霜飛丹始熟齋心潔己方堪服手把天瓢盡意天但覺神歡陰鬼哭天之三徒日月星三光不死爲三靈地之徒子食産貨終成泯没無留形人徒精炁神三藥得法烹煉死方却天官巳上得更生合甲配離超死厄天關細細籥靈風地軸時時橐火紅風降火升成鼎象心藏密户水金宫此是先天無極道混元設教爲天寳不拘子午擇陰陽性復情還人不老手爲人間把盛衰閉口牢牢提兌姬周易下經無義易行之道妙獨難知此箇天關從古祕都縁此道忒容易若能轉此生殺機山澤何愁不通炁震稱男足動成非女殳牽情巽莫隨會得箇中恒益理雷風相搏是天機足字從口又從止口訓防閑止訓止若非止止密防閑無上神仙只在此耳目之官不解思尋聲逐色死爲期耳收聽返能相射水火潜交也太奇俱知耳目坎離户水火飛騰盡由汝含光凝韻兩平時魄聖魂昌易寒暑知盧守靜總云知復命歸根會者稀精炁通天恒重厚玄關一竅是天機玄關一竅通水府心號離宫身牝户此皆内象玄牝門左右閑言君勿取玄牝之門識者稀多將口鼻强呼之心腎兩邊分左右俱非天地坎和離迷者不識眞金木肝膽肺腸稱九曲砂汞鉛銀若箇知天地神仙爲眷屬五車三乘羊車小乘羊車小乘者橐籥起火之術也其法抽縮外腎使膀胱下昧民火下合外腎左文右武之地火從下上達直透三關行之七七日内自有甘露降于玉池甘露一名黄中酒又名曰石源又名醍醐常能行而不弛可以返老還童漸入聖道矣鹿車中乘鹿車中乘者守中之法也其法降心中上昧君火入于兩腎之間與中昧臣火相配化爲芙蓉出於泓水之中存其眞人坐于花上綿綿不絶如此二十日通前羊車小乘之術共計六十九日則泥丸天谷靈藥自生靈藥一名黑汞水銀一名水中金即元精也此乃補腦還精之法人能常念之則優入聖域矣或以轆轤爲鹿車者乃循眞之事也每日寅艮二時端坐存念鹿車之道毋令間斷亦以四十九日爲限須是先行羊車次行鹿車既行鹿車乃行牛車三車並行斯名大乘也老子之治大國若烹小鮮包犧之法離爲網罟以畋以漁堯舜則允執厥中文王之艮其背周公之艮限薰心孔子之退藏於密者皆守中之旨也曰産藥曰鍊鉛實腹鉛乃黑鉛即黑汞也亦名黑龜精又名黑龜肝降于天谷謂之白龍肝也此守中於始之名也曰温養曰神土坎火此守中於中之名也曰守城曰野戰曰封閉關鎖此守中於終之名也曰沐浴曰眞炁熏蒸此守中於刑德之名也有曰守一者以左腎之神爲太一右腎之神爲玄一兩腎混合之神爲太一也有曰守眞者以二之則僞一之則眞也有曰守黑者以顯之則白隱之則黑也有曰守雌者以奮飛爲雄隱伏爲雌也又守有黄房者以密户居正方前直臍中也黄房者亦名黄庭又曰丹田說不多同有指泥壇爲之者泥壇泥丸亦名天谷亦名天有指絳宫爲之者絳宫上命門也又名節榮亦名應谷又有指心腎脾膽爲之者是皆思一部之法耳苟欲主陽消陰俾水中金火中木二者内無間隔非守中不能也然此守中之法乃累聖相傳之密旨實作聖工夫也誠能允而執之則必世世羲陶人人虞舜矣陟容廣而遊太清金梯玉階此焉基之牛車大乘牛車大乘者屏炁回風之道也屏氣者閉鼻息而不呼也出炁曰呼入炁曰吸回風者回天風以合神靈也神靈心神曰元君字守靈凡行此道者須先行羊車四十九日鹿車二十日共六十九日了却行此道一十二日三車通計八十一日自然天谷靈藥繁生可以修眞矣若上機大智之士一聞千悟者三車並行只一十日靈藥便生不須八十一日也若作聖做工夫却當次第行之不可驟也且先不拘時候行羊車四十九日了次每日寅艮二時行鹿車四十九日然後每日子午艮寅三時行牛車四十九日一百四十七日足依然不拘時候行之實使綿綿不絶可也所謂君子自强不息者盡行此道欲不倦也綿綿不絶惟狂克念作聖矣行之苟倦惟聖罔念作狂矣克念作聖則道心著而人心安罔念作狂則人心危而道心微矣羊鹿牛三車其實一大乘也但人有利鈍而性有巧拙故先聖立教有漸頓之殊況且世人不務勤師唯尚摽掠見丹經有閉尾閭之說便以羊車爲閉尾閭而廢之見丹經有吹嘘之說便以牛車爲吹嘘而廢之見丹經有存息之說便以鹿車爲存息而廢之殊不思不行羊車則地火不起人心危而不安矣不行牛車則天風不回道心微而不著矣不行鹿車則百神不混合人心自人心道心自道心而不精一矣老子之橐簫守中玉皇之回風混合大舜則精一厥中亦大乘而已非二道也右先聖之誚閉尾閭者指採陰者耳以採陰爲殺人之道也誚吹嘘者指行六字炁者耳以六字爲瀉三焦五藏之道也誚存息者指注想臍下者耳以臍爲糟粕溝瀆之場止可灼艾攻病非栖心退藏之所也癡人面上不得說夢將以救人反以悟人豈聖師之心哉遂明述大乘之道以祛天下之惑學道者苟留神焉聖域可優入矣皇極之人會歸中庸之率性三易之中爻皆畢於此矣勉旃古訣云人心惟危腎邪人心從之則危道心惟微心正道心放之則微惟精惟一精强不敗一終不離允執厥中信天順守作聖之域大牛車上乘大牛車上乘者修眞内鍊之法也其法以元精黑汞爲藥元炁紅鉛爲火子陽午陰抽添斤兩口口相傳不記文字三年功成九載圓就化精成炁炁變成神千日默朝一紀升天即修内丹可以長生不死可以坐脱立亡已證眞空邁躋妙有矣大白牛車無上乘大白牛車無上乘者用雪山白牛外丹修仙之術也所謂乾坤爲鼎器乾爲馬其道成男曰大國大象者皆乾道也坤爲牛其道成女爲波斯伽曰小國小象者皆坤道也少爲波斯伽屬兌卦兌屬金而金色白故曰白牛乾變坤卦主立冬小雪二炁占先天艮山之位故曰雪山白牛也坎離爲藥物坎爲中男坤得乾之中炁而成也坎屬水而配鉛水中有金鉛中有銀名曰黑汞又名水銀此坎之藥物也離爲中女爲波斯伽乾得坤之中炁而成也離屬火而配砂火中有木沙中有汞名曰紅鉛又名朱汞亦名水銀此離之藥物也五千文謂之玄牝者乾坤也營魄者離坎也七返九還金液煉形者是也一時姤精一日結胎十月脱胎三年無陰是謂純陽之仙六年絶粒鼻無喘息名曰至眞白玉其骨黄金其筋履蹈虚空洞貫金石此修仙之極致也自老子黄帝而下凡飛騰變化之儔皆修此耳故老子作道德經以詔後世黄帝著陰符經以彰厥㫖其文三章皆累聖口口相傳無有文字後世傳之者率多乖舛黄帝得之於石室字皆一丈又云驪山老母曾註其文是好事者托言之耳學者當具眞眼目眞人魏伯陽因之作周易參同契以極其底藴正陽鍾離權由之作雲房三十九章以祛似是之惑純陽吕嵓縁之作沁園春霜天曉角及窑頭脱空等歌以廣其意華陽施肩吾脩之作會眞記以誘進學之士雖皆發明道要顯示機緘然而火候法度温養指歸並不曾說破天台怡眞先生謫自紫陽眞人宿德不渝感西華夫人發樞紐而授之以口訣道成授杏林石泰以悟眞篇杏林道成授紫賢薛道光以還元篇紫賢道成授泥丸眞人以復命篇泥丸道成授紫清眞人白玉蟾以翠虚篇厥後之聞道者紫清之徒也愚宿性慕道獲遇紫清先生弟子桃源子姚師果見其龜形象武意其異人執弟子之禮者幾一紀累以鉛汞之道叩之每辱引辭峻拒嘉熙己亥從道御前佑聖觀守缺暫歸次年庚子慨蒙奏聞道祖傳受内丹之訣如教行之果有靈驗尋爲事奪兩致中輟續觀悟眞篇云若云九載三年者總是推延款日程又云十月霜飛丹始熟恁時神鬼也須驚乃知内丹九年成功外丹十月脱胎由是蓬頭草足浪走台温有菜隱先生楊師古邂逅永嘉廛隱一見傾心授以藥物鼎器之旨時淳祐癸卯十一月也甲辰三月三日復授以火候回視丹經果合符節元來此道乃是長生不死變化飛騰之道今人往往只說速死之法否則守屍而已愚患後人之篤好者或有所聞剛爲此輩所惑共墮迷津實可哀痛姑略具其梗槩云註紫清白眞人金液大還外丹訣要做神仙天寳修聖謂之煉聖之道藥物無斤兩火候無時日一日十二時時時不絶一年十二月月月長存百日成功一年圓就養成聖胎名金液大遺神丹是爲三車大乘之道也乃千經之髓萬法之基也靈寳修眞謂之煉炁之法藥物有斤兩火候有時日一日十二時只用二時一年十二月只用十月三年成功九載圓就養成眞胎名曰金液大遺内丹是謂大牛車上乘之法也九載數足凝神天谷日行默朝上帝之訣精勤千日通前一紀脱殻飛神不生不滅矣神寳修仙謂之煉形之術藥物雖無斤兩火候却有時日一日十二時只用一時一年十二月只用九月九十日成功三百日圓就始出仙胎點化凡質不但却死且得更生服之三年體變純陽不愁寒暑養之六載鼻無喘息不患飢虚三千日足變化飛騰矣名曰金液大遺外丹是爲大白牛車無上乘之術也鍊丹工夫鍊丹有三種一者神丹以存養而成謂之打坐二者眞丹以作用而成謂之行功三者仙丹理貫三才藥需二物謂之工夫亦有何難神丹三萬六千刻刻刻行火一刻不行便成間斷也内丹七百二十以上時時時行火一時不行亦成間斷也外丹只八十一時行火而已豈不易乎向雷聲震處謂地雷復卦之月也一陽來復謂七日來復之日也玉罏火熾玉罏偃月罏也火者天然眞火也得金鼎太素寒煙感之則火熾矣金鼎煙寒金鼎朱砂鼎也煙者太素煙也得玉罏天然之火則煙不寒矣姹女乘龍姹女震中陰爻也乘者載也龍者赤龍與青龍也金公跨虎金公兌中陽爻也跨虎騎也虎者黑虎與白虎也片餉之間結大還片餉之間者一食飯頃也結者鉛凝汞結也大者至大無外也遺者遺源返本也此金液大遺外丹雖假外藥即非金銀草木滓質之物止是太極未判之前先天一炁耳既有兩儀四象八卦五行則先天一炁分列四出散於萬物之内矣今能以不採之採不取之取而取之使天之炁復合爲一是故謂之遺也丹田裏丹田者黄房也密户也又名元田左有八卦蒼龍右有八威赤蛇中有金精猛獸三蟲内顧長生有路三蟲外趍神光漸去心神丹元君用離爲網罟於此以畋以漁使三蟲不得奔逸以修深根固蔕長生乆視之道田漁二字皆從田故曰丹田也或以臍下一寸五分炁海爲丹田者或以二寸石門爲丹田者或以三寸關元爲丹田者此乃醫家行針灸之上下中三丹田之穴道也又以一寸三分爲丹田者此是初機學道之士入門之丹田也又以心爲丹田者此是襌門寂子明心見性之丹田者也又以胃左脾藏爲丹田者此是饕餮之人行中黄健啖之丹田也又以脾右肝膽爲丹田者此是俗師不遇眞訣見雲房三十九章及破迷歌論等書攻擊捭闔混無定當只不曾說到膽上故執肝膽爲丹田也又以眉心爲丹田者此是入定出陰靈之丹田也以鼻端爲丹田者此是襌流習定之丹田也以把花執菜握箑持瓢爲丹田者此是開鋪席道人假物寄神之丹田也以嬰童兩目爲丹田者此是學視日不瞬之丹田也以胞囊爲丹田者此是閉尾閭之丹田也以玉莖爲丹田者此是行金剛襌左道術者不漏法之丹田也以不念善不念惡謂之懸厓撒手爲丹田者此是瞎眼襌和不明無念之旨者之丹田也以胃脘玉女爲丹田者此是嗽嚥津液之丹田也以臍心爲丹田者此是旁門採陰者想心火之丹田也以兩目爲丹田者此是存想左日右月之丹田也以大顴骨爲丹田者此是存想九色圓象之丹田也又以面曰尺宅爲丹田者此是修神庭之丹田也千蹊萬徑難以盡述要之皆非正丹田也正丹田者密户而已矣又以七竅中間爲丹田者此是含眼光凝耳韻緘舌炁調鼻息和合四象之丹田也學道者之所共務不可廢也以泥壇爲丹田者此是鍊内丹者一載之後移罏换鼎之丹田也初修眞之士不當用之有白鴉一隻白鴉者元田白鴉也一名黑汞亦名白金即眞汞也黑白相混故謂之白鴉隱而不可見則謂之水中金鉛中銀顯而不可用則謂之寒山白雪以其能走故謂之金精猛獸以其能飛故謂之白鴉一物而異名耳飛入泥丸飛入者用天寳鍊神混元入藥訣三車大乘之道二十日不間斷使元田眞汞繁生所謂眞種子者只此元田白鴉是也河車運入崑山河車者三河車也一者黄河車即雙關轆轤法耳所謂三返晝夜用師萬倍者也二者河車即橐籥起火術耳所謂河車不敢暫時停運入崑崙峰頂者三者紫河車即龍虎交姤訣耳桔槔說盡無生曲井底泥蛇舞柘枝者是也崑山崑崙峰即泥壇耳全不動纖毫過玉關謂元田白鴉不費纎毫動作自然透過玉關也玉關者戊己門也或毫略動便不成丹也把龜蛇烏兔把者將也龜蛇烏兔者水火日月也玄牝營魄也鉛砂汞銀也離中坎坎中離也名號多端其實只陰陽二字耳生擒活捉生擒活捉者蓋龜蛇烏兔非一性之物東西南北各列一方百姓日用常相間隔遺丹之法使無間隔之憂而有同宫之慶豈非生擒活捉哉古有王谷子不修陰陽之眞理見易有乾道成男坤道成女及一陰一陽之謂道之語妄立三峰之術以女玄邕爲上峰乳湩爲中峰室童爲下峰其徒助虐師意至於剖取心血竭吸陰精以爲藥物冀成遺丹故雲房三十九章有悮殺之戒朋來之勸也霎時雲雨霎時者片餉也即感速之義也雲雨者雲雷屯及雷雨作解之義也夫雲之與雨皆坎水之炁耳而坎水遍於天地間感天炁則升而爲雲感地炁則降而爲雨雲雨之義即陰陽升降而成潤澤之義也一點成丹一點者赤水玄珠也大如黍米故曰一點也成丹者從微而著也白雪漫空黄芽滿院空别本作天院别本作地白雪者六虚白雪也空者六虚也黄芽者出土黄芽也院者六慾内院也六欲内院亦名黄宫以兩腎有六癸玉女專主作强其鋒甚锐靈寳經謂斬馘六癸鋒者乃教人抑制六癸玉女作强之鋒庶幾黄芽滿而不溢也是以眞人有莫教芽孽溢黄宫之戒黄芽白雪其名甚衆始也周流首腹四肢則爲六虚白雪及其朝宗曲江之上則爲太玄神水會歸桂海之中則爲碧潭明月矣其潤德則爲沆瀣甘露透入金鼎華池則爲火汞流珠繁生黄宫眞汞則爲出黄芽名雖不同其實赤水玄珠耳諸家仙經所載名各不同雲房三十九章云眞道不關書蓋務學不如務求師也服此刀圭永駐顏服此者靈烏望月而飲甘泉也刀者謂上士行之能裁成天地之道下士行之則殺身而後已圭者戊己二土也永駐顏者長生不老也打坐行功工夫各有一千二百門皆可以駐顏但不能長生不死耳惟是祖述老子伏羲文王周公孔子魏伯陽錘離吕嵓仙諸大聖人上焉黄帝下焉悟眞一脉之道者斯能永駐顏也常温養温養節次有六一者入藥温養煉内鉛爲眞種子時也二者野戰温養進火時也三者守城温養退火時也四者沐浴温養火敗火死而熏蒸時也五者補寒温養火絶而虚守時也六者移罏换鼎温養脱胎入口之後時也其名雖六不過只用入藥一訣耳始一終五故曰常也使脱胎神化脱胎有三一者脱胎入口所謂强歷十月脱出其胎者也二者脱胎離殻所謂鷄能抱卵心常聽蟬到成形殻自分也三者脱去凡胎所謂形神俱妙與道合眞也神者不行而至不疾而速也化者眞無貫金石妙有蹈虚空也身在雲端身有三一曰自有身所謂養就嬰兒我自做非是爺精娘血者也二者離合身謂坐在立亡身外有身者也三者妙無身所謂聚則成形散則成氣者既證自有之身是爲地仙仙胎飛入泥丸泥丸爲崑崙峰乃在自己雲端也次證離合之身是爲神仙胎仙脱殻躡雲乃形雖處地而神在雲端也及證妙無之身是爲天仙神超碧落形陟太虚乃形與神同在雲端也金液遺丹之妙至於身在云端其爲不空之空矣述贊純陽眞人霜天曉角乾坤未裂有物如何别性著才生炁陰陽尚混融鴻濛爲太極體一抱雌雄解把鴻濛擘破龍漢延康劫鴻濛有女青女青從剖破兆出萬殊形說不知知不說闊論高談者無非衍舌端上仙修命術開口向人難妙訣眞難徹妙道神仙訣宣傳自太清不逢師指點臆度枉傷情知音世所絶無數修仙子爭猜紙上文先師從說破瞶瞶反無聞要識陰陽顛倒乾坤盪中氣離坎是全材識得先天象身朝萬化來月中日太陰元屬坎中有兔爲陽房日雲中象營來變至剛日中月太陽離仲女中有桂林烏畢月恒山滿逢之魄自蘇天寳鍊神混元入藥妙訣一葉一枝花五内玲瓏玉雪身雖多關節解通神月明酒裏丹霞出不染汙泥不染塵陰坑是我家兩畔寒巖銷玉冰中間一派水澄清太陽影裏心花現便是芙蓉閬苑城硫黄見我死五神意馬是硫黄專駕心猿走八方妙香絶色濃薰染化作眞人坐道場水銀結成砂黑汞紅鉛是水銀腎精心炁劈天眞重新匹配歸無極漸證陰陽自有身鍊藥指眞歌上品藥材何物是産在塵凡無遠邇强名玄牝汞和鉛精炁與神而已矣煉精者煉元精非婬妷所感之精男不婬女不妷匪學三峰黄谷術内裏明來會性情虚空無塵生妙質鍊炁者鍊元炁非口鼻呼吸之炁鼻不呼口不吸籥天橐地停徐息巽風離火鼎中烹直使身安命方立鍊神者鍊元神非心意念慮之神心不念意不慮念慮無非憂憶處忘憂絶憶靜存神精炁直騰天谷去精炁神藥最親以此修丹尚未眞修丹只要乾坤髓乾坤髓即坎離仁坎離仁人不識萬論千書徒自覓天涯海角有仙師仙師混迹塵凡客塵凡客隱至人夏葛冬裘如古民榮辱窮通都不管㝠㝠懷抱藴精淳㝠㝠懷抱藴精淳妙道天機肯妄陳行滿三千功八百豈愁提耳不諄諄丹經舉要丹經最是易爲先有畫無文幾萬年西伯授官紬藏史仲尼問禮斷韋編中宣道德皆微旨後露參同亦正傳平叔悟眞猶顯道不離左右目之前三要總叙曰橐籥守中者老聃之三要也所謂綿綿若存者也曰闢户謂之乾闔户謂之坤聖人以此洗心退藏於密者孔子之三要也所謂往來不窮者也曰頂法暖法忍法釋氏之三要也所謂火宅三車者也諸家三要之說不同者以不得正傳也捨三聖師而宗曲學焉能出火宅而綿綿不窮乎三關總叙以精炁神爲三關者内丹之三關也以形炁神爲三關者外丹之三關也以鼻手足爲三關者合内外之三關也九鼎總叙指心爲九鼎者以心上通七竅下通二陰也所謂包含萬象體不罣一絲頭者也指絳宫爲九鼎者以絳宫上通七節下通兩腎也所謂三彭走出含陰宅萬國來朝赤帝宫者也指密户爲九鼎者以有三一六癸也指泥壇爲九鼎者以有天靈九宫也二者所謂從此變爲乾健體潜藏飛躍總由心者也指子時爲九鼎者以甲己子午皆數九也所謂正一陽初動中宵漏永者也指一月爲九鼎者以一月有九還也指一年爲九鼎者以一年有九轉也所謂一月一還爲一轉一年九轉九還同者也指三年爲九鼎者以年成三姓三年成九姓也所謂三鉛只得一鉛就金菓仙桃已露形者也指九載爲九鼎者以一載煉一丹九載煉九丹也所謂一載生箇兒箇箇會騎鶴者也陰符破迷贊至樂性餘仁者無憂此性不欠智者常樂此性無餘既無樂也其樂自生極樂徇情性有餘矣至靜則廉靜者成仁動者由智苟動趍末性靜歸根篤靜不至乃生貪求絶利一源是爲廉也陰符經註解頗多必皆託名聖賢取信愚俗但所見不同互有得失反誤學者故摭迮而明者爲二贊以曉方來觀者當必有默會者矣古仙眞訣集句父子不堪傳天下神器箇箇惜金璧重寳不浪擲依然傳授與兒孫道不肯傳說不得工夫牛鬥危大道無爲自古傳不云靜坐只安眠防虞慮險如牛鬥此語胡爲不自然畫瓶裏面覓粉抺脂塗一畫瓶玉葫蘆樣果通靈水晶宫裏嫦娥翠一朵梅梨縞兔塋下士大笑之上士謙卑明造化一言便解眞人話劣馬痴驢直痛鞭放下韁繩作笑鞄普角步教二切紫陽白眞人嘗贈趙寺丞詩云汞鉛不在身中取龍虎當爲意外求會得這些眞造化何愁不曉鍊丹頭此語正與紫陽眞人孤陰之說相契故併録于此也勸君不用斬三尸但絶貪嗔與妷癡六慾天中居内院精勤十月養嬰兒十月脱胎吞入口穿筋洞骨能飛走等閑俓達元始天壽比天長同地乆天長地乆無盡時遷質移形人不知星辰隕伏龍蛇起一箇乾坤不動絲堪歎時人見大别清高盡向無邊說求生得死比比然倚草投胎稱寂滅此箇機關古聖傳仲尼三度絶韋編乾道坤道而已矣在於上下求之焉乾坤之道非他物只道杳㝠並恍惚眞精象物暗相逢結在黄宫成糊塗糊塗成形史伯華功勞全仗紫河車紫河車是何形色井底泥中一紫蛇修眞六用曉夜半寒泉動地雷損奇益偶著靈胎一壼鳳髓朝朝飲海底紅蓮火底栽暮日中姤象振天風武减文加一餉工熟煮龜肝餐八兩山泉空泥暮爲蒙行孤雲地暖閑離岫野鶴天寬倦返巢直道往來無絆礙火城何必繫如匏住赫日騰空碾不停光芒馳散小於星育精金水丘寒地露沐千山草木青坐洗心藏密匪求安歸復工夫怕十寒水土既平神鼎立芙蓉地裏坐端端卧默默昏昏入鬼窠惺惺憭憭未圓陁西山日暝烏巢桂解鬼休兵馳睡魔五空頌頑空頑空枯坐斬生縁日事無縈夜不眠形木心灰成底事有聞行道却凝堅性空性空虚曠日清閑動若浮雲靜似山懶打頑空無則法有聞行道必間關法空法空大抵似頑空有動依然在靜中按月按時行卦炁二千門路擬皆通不空不空空裏有工夫歸復元陽靜處符陽復陰消須凈盡惟餘黍米一明珠眞空眞空妙用妙難思彷彿還如歲運推夜代晝更寒暑序了無停迹孰爲之修丹十戒一戒遏惡勿聽心田惡念生芟除凈盡自明平惡人惡事須還遠炁定神安骨自清二戒揚善孝友仁慈衆善芽更須執禮奬忠加救危扶困揚諸善長作尊賢樂道家三戒懲忿心火炎揚大察明怒將肝膽木來生苟非懲忿從天訓五賊張狂道海傾四戒窒慾主腎之宫號作强六鋒列女更殃𦍙地根不斬貪生樂慾海吹流入鬼鄉五戒禁酒點酒纔經十二樓膽房心室起戈矛眞陽泄向皮膚去髮减精凋去不休六戒絶荼草曰穿腸莫强吞只宜搜洗濁和昏如神不撓清明志身有甘香白石源七戒朝實朝食胡云校實些風寒暑濕怕衝邪功深已飽三田炁食味空多費齒牙八戒暮虚暮食常令腹帶虚六經調暢炁通疏多餐一口徒堙塞畎澮皆盈落尾閭九戒高牀坐卧牀宜三尺高更宜和軟足堅牢低時鬼炁侵人骨莞藁頻睎莫憚勞十戒低枕枕若高時最不宜慳慳三寸莫宜低眞機妙㫖無人會須遇仙師得耳提修仙善惡勸戒孝而不貪孝道無爲百行先唐虞一脉此中傳苟貪利禄輕捐隕與道相違天與淵悌而不慾事兄從長孝能推悌道能爲世表儀人欲一毫來間隔乖爭凌犯出肝脾恕而不嫉恕道元來甚易行但將心地放教平心平炁定無他事和炁春風日日生忠而不妬君師夫主事宜忠粒粟莖絲報始終知本知恩須合道妬才妬德反爲凶神聖不𡜍孝悌恕忠皆至德惟神與聖妙無極是爲五大道之原拘忌之時行不得智而不婬智德元來先五德知道方爲眞知識一淪婬慾便昏迷所以申棖遭棄擲禮而不盜尊卑長幼俱有分貴賤賢愚不可紋常將恭敬守文禮躐等干名作盜論仁而不殺仁者誠爲五德長善順慈和能育養曰悲曰覺曰陽剛悲戚剛頑殺之象義而不害五德權衡存於義事無不宜義乃利絲毫不利則害人君子謀爲須擬議忠信不憎智禮仁義道之苗苟無忠信亦徒勞全此五常誠得本憎疑纔動墮沉曹言無華綺人道貴華仙道實華綺之言不可出口甜舌滑能悅人只恐神仙道俱失口無惡聲此口誠爲禍福關興戎出好片言間惡聲貴不形諸口天道從來亦好遺食無求飽飲食雖云能養炁養生過厚人不貴愚人飽味賢飽聞實腹有鉛宜著意居無求安居處求安最不宜不抽之緒密抽之守中橐籥綿綿用便是宣尼屏炁時對北勿唾學道須當惜炁精唾時精炁亦飄零北方天一五行始唾涕于兹隕百靈對北勿溺毋令尿露三光倚溺行屙大不祥對北二便尤不可都縁天一在其方勿妄殺龜龜配危星五行水應人左腎生根始無故殺之大不祥學道之人尤忌此勿妄打虵虵配虚星水中火應人右腎能關鎖無故打之大不祥學道之人尤忌可禁絶牛肉牛之爲物詎難言簡籍敷陳歷歷然殺有嚴刑刊在律食多明報至於天福鎸首致神光熄禍及終貽鬼録編縱是陰功山嶽大削來磨去不饒賢天帝三霜一饗之凡庸烏可妄思爲虧名失利皆由此惹疫遭官亦自兹好信因縁培福德毋躭口腹長愚癡飯蔬飲水猶堪樂何苦長年被舌欺三極至命筌蹄
